name: ymusic
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # Authentication
  google_sign_in: ^6.0.0

  # Audio/Video
  just_audio: ^0.9.0
  audio_service: ^0.18.0
  video_player: ^2.8.0

  # YouTube
  youtube_explode_dart: ^1.10.0

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod: ^2.4.0

  # Local Database
  isar: ^3.0.0

  # HTTP & Networking
  dio: ^5.4.0

  # File Storage
  path_provider: ^2.1.0

  # Navigation
  go_router: ^14.0.0

  # UI Enhancements
  google_fonts: ^4.0.0

  # Note: chewie and webfeed will be added in later phases (video and podcast phases)
  # due to dependency conflicts with current SDK version

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Build runners (will be added in later phases after dependency stabilization)
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
