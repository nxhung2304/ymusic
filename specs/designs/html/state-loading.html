<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>Ymusic – Loading Skeleton</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; }
    .phone { width: 390px; height: 844px; background: #0D0D0D; border-radius: 44px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 40px 120px rgba(0,0,0,0.8); }
    .status-bar { height: 44px; padding: 14px 24px 0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .status-time { font-size: 15px; font-weight: 600; color: #FFFFFF; }
    .status-icons { display: flex; align-items: center; gap: 6px; }
    .content { flex: 1; padding: 16px 20px; display: flex; flex-direction: column; gap: 28px; overflow: hidden; }

    /* Skeleton shimmer animation */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #1C1C1E 25%, #2A2A2E 50%, #1C1C1E 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite linear;
      border-radius: 6px;
    }

    /* Header skeleton */
    .header-skel { display: flex; align-items: center; justify-content: space-between; }
    .header-text { display: flex; flex-direction: column; gap: 8px; }
    .skel-line-sm { height: 12px; border-radius: 6px; }
    .skel-line-lg { height: 20px; border-radius: 6px; }
    .skel-circle { border-radius: 50%; flex-shrink: 0; }

    /* Section skeleton */
    .section-skel { display: flex; flex-direction: column; gap: 12px; }
    .section-header-skel { display: flex; align-items: center; justify-content: space-between; }

    /* Album cards skeleton */
    .albums-row { display: flex; gap: 12px; }
    .album-skel { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }

    /* Song row skeleton */
    .song-skel { display: flex; align-items: center; gap: 12px; }
    .song-skel-info { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  </style>
</head>
<body>
  <div class="phone" data-widget="Scaffold">
    <div class="status-bar" data-widget="SafeArea">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M8 9.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3zM1.5 4.5a9 9 0 0113 0l-1.5 1.5a7 7 0 00-10 0L1.5 4.5zM4.5 7.5a5 5 0 017 0l-1.5 1.5a3 3 0 00-4 0L4.5 7.5zM.5 1.5A12 12 0 0115.5 1.5L14 3A10 10 0 002 3L.5 1.5z"/></svg>
        <svg width="20" height="12" viewBox="0 0 20 12" fill="none"><rect x="0.5" y="0.5" width="16" height="11" rx="2.5" stroke="white" stroke-opacity="0.35"/><rect x="2" y="2" width="11" height="8" rx="1.5" fill="white"/><path d="M17.5 4v4a1.5 1.5 0 000-4z" fill="white" fill-opacity="0.4"/></svg>
      </div>
    </div>

    <div class="content" data-widget="Column" data-state="loading">
      <!-- Header skeleton -->
      <div class="header-skel">
        <div class="header-text">
          <div class="skeleton skel-line-sm" data-widget="Shimmer" style="width: 80px;"></div>
          <div class="skeleton skel-line-lg" data-widget="Shimmer" style="width: 140px;"></div>
        </div>
        <div class="skeleton skel-circle" data-widget="Shimmer" style="width: 40px; height: 40px;"></div>
      </div>

      <!-- Recently played skeleton -->
      <div class="section-skel">
        <div class="section-header-skel">
          <div class="skeleton skel-line-lg" data-widget="Shimmer" style="width: 130px;"></div>
          <div class="skeleton skel-line-sm" data-widget="Shimmer" style="width: 44px;"></div>
        </div>
        <div class="albums-row">
          <div class="album-skel">
            <div class="skeleton" data-widget="Shimmer" style="width: 110px; height: 110px; border-radius: 10px;"></div>
            <div class="skeleton skel-line-sm" data-widget="Shimmer" style="width: 90px;"></div>
            <div class="skeleton skel-line-sm" data-widget="Shimmer" style="width: 70px; opacity: 0.5;"></div>
          </div>
          <div class="album-skel">
            <div class="skeleton" data-widget="Shimmer" style="width: 110px; height: 110px; border-radius: 10px;"></div>
            <div class="skeleton skel-line-sm" data-widget="Shimmer" style="width: 80px;"></div>
            <div class="skeleton skel-line-sm" data-widget="Shimmer" style="width: 60px; opacity: 0.5;"></div>
          </div>
          <div class="album-skel">
            <div class="skeleton" data-widget="Shimmer" style="width: 110px; height: 110px; border-radius: 10px;"></div>
            <div class="skeleton skel-line-sm" data-widget="Shimmer" style="width: 85px;"></div>
            <div class="skeleton skel-line-sm" data-widget="Shimmer" style="width: 55px; opacity: 0.5;"></div>
          </div>
        </div>
      </div>

      <!-- Song list skeleton -->
      <div class="section-skel">
        <div class="skeleton skel-line-lg" data-widget="Shimmer" style="width: 140px;"></div>
        <div class="song-skel">
          <div class="skeleton" data-widget="Shimmer" style="width: 44px; height: 44px; border-radius: 8px; flex-shrink: 0;"></div>
          <div class="song-skel-info">
            <div class="skeleton skel-line-sm" data-widget="Shimmer" style="width: 130px;"></div>
            <div class="skeleton skel-line-sm" data-widget="Shimmer" style="width: 90px; opacity: 0.5;"></div>
          </div>
        </div>
        <div class="song-skel">
          <div class="skeleton" data-widget="Shimmer" style="width: 44px; height: 44px; border-radius: 8px; flex-shrink: 0;"></div>
          <div class="song-skel-info">
            <div class="skeleton skel-line-sm" data-widget="Shimmer" style="width: 110px;"></div>
            <div class="skeleton skel-line-sm" data-widget="Shimmer" style="width: 80px; opacity: 0.5;"></div>
          </div>
        </div>
        <div class="song-skel">
          <div class="skeleton" data-widget="Shimmer" style="width: 44px; height: 44px; border-radius: 8px; flex-shrink: 0;"></div>
          <div class="song-skel-info">
            <div class="skeleton skel-line-sm" data-widget="Shimmer" style="width: 150px;"></div>
            <div class="skeleton skel-line-sm" data-widget="Shimmer" style="width: 100px; opacity: 0.5;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>setTimeout(()=>{location.href='home.html'},2000)</script>
</body>
</html>
