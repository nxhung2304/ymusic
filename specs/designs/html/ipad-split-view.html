<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1024, initial-scale=1.0" />
  <title>Ymusic – iPad Split View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }
    .ipad {
      width: 1024px;
      height: 768px;
      background: #0D0D0D;
      border-radius: 22px;
      overflow: hidden;
      display: flex;
      box-shadow: 0 40px 120px rgba(0,0,0,0.8);
    }

    /* ── LEFT SIDEBAR (280px) ── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: #141414;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-header {
      padding: 32px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-title { font-size: 22px; font-weight: 700; color: #FFFFFF; }
    .sidebar-add { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .sidebar-nav { flex: 1; padding: 4px 12px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; scrollbar-width: none; }
    .sidebar-nav::-webkit-scrollbar { display: none; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); }
    .nav-item.active { background: rgba(124, 58, 237, 0.2); }
    .nav-icon { width: 18px; height: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .nav-label { font-size: 14px; font-weight: 500; color: #9CA3AF; }
    .nav-item.active .nav-label { color: #FFFFFF; font-weight: 600; }
    .nav-count { margin-left: auto; font-size: 12px; color: #6B7280; }
    .nav-item.active .nav-count { color: #A78BFA; }
    /* Divider */
    .sidebar-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 8px 12px; }

    /* ── MAIN CONTENT (flex: 1) ── */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* Song list area */
    .song-list-area {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .song-list-area::-webkit-scrollbar { display: none; }
    .list-header {
      padding: 28px 24px 12px;
      font-size: 13px;
      color: #6B7280;
      font-weight: 500;
    }
    .song-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 24px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .song-row:hover { background: rgba(255,255,255,0.04); }
    .song-row.active { background: rgba(124, 58, 237, 0.12); }
    .song-thumb { width: 40px; height: 40px; border-radius: 6px; flex-shrink: 0; }
    .song-thumb.blinding { background: linear-gradient(135deg, #3B1FA8, #7C3AED); }
    .song-thumb.starboy { background: linear-gradient(135deg, #7C1F2E, #BE185D); }
    .song-thumb.save { background: linear-gradient(135deg, #1E3A5F, #2563EB); }
    .song-info { flex: 1; min-width: 0; }
    .song-title { font-size: 14px; font-weight: 600; color: #FFFFFF; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-title.active-text { color: #A78BFA; }
    .song-artist { font-size: 12px; color: #6B7280; margin-top: 2px; }

    /* ── PLAYER PANEL (bottom) ── */
    .player-panel {
      background: #111111;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }
    /* Now playing info */
    .player-thumb { width: 52px; height: 52px; border-radius: 8px; background: linear-gradient(135deg, #3B1FA8, #7C3AED); flex-shrink: 0; }
    .player-info { display: flex; flex-direction: column; min-width: 0; width: 160px; }
    .player-title { font-size: 14px; font-weight: 600; color: #FFFFFF; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-artist { font-size: 12px; color: #9CA3AF; margin-top: 2px; }
    .player-artist-album { font-size: 11px; color: #6B7280; }
    /* Progress section */
    .player-progress { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .progress-bar { height: 4px; background: rgba(255,255,255,0.12); border-radius: 2px; position: relative; cursor: pointer; }
    .progress-fill { height: 100%; width: 44%; background: linear-gradient(90deg, #7C3AED, #A855F7); border-radius: 2px; position: relative; }
    .progress-thumb-dot { position: absolute; right: -5px; top: 50%; transform: translateY(-50%); width: 10px; height: 10px; background: #FFFFFF; border-radius: 50%; }
    .controls-row { display: flex; align-items: center; justify-content: center; gap: 20px; }
    .ctrl-btn { display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .play-btn { width: 44px; height: 44px; border-radius: 50%; background: #7C3AED; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .time-row { display: flex; justify-content: space-between; margin-top: 2px; }
    .time-text { font-size: 11px; color: #6B7280; }
  </style>
</head>
<body>
  <div class="ipad">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Library</span>
        <div class="sidebar-add">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v12M3 9h12" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
      </div>
      <div class="sidebar-nav">
        <div class="nav-item active">
          <div class="nav-icon">
            <svg width="16" height="14" viewBox="0 0 16 14" fill="#A78BFA"><path d="M8 13S1 8.5 1 4a4 4 0 017-2.6A4 4 0 0115 4c0 4.5-7 9-7 9z"/></svg>
          </div>
          <span class="nav-label">Liked Songs</span>
          <span class="nav-count">42</span>
        </div>
        <div class="nav-item">
          <div class="nav-icon">
            <svg width="16" height="14" viewBox="0 0 16 14" fill="none"><circle cx="5" cy="7" r="4" stroke="#9CA3AF" stroke-width="1.5"/><path d="M9 4h6M9 7h6M9 10h4" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
          <span class="nav-label">Recent</span>
        </div>
        <div class="nav-item">
          <div class="nav-icon">
            <svg width="16" height="14" viewBox="0 0 16 14" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="#9CA3AF" stroke-width="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="#9CA3AF" stroke-width="1.5"/><rect x="1" y="9" width="6" height="5" rx="1.5" stroke="#9CA3AF" stroke-width="1.5"/><rect x="9" y="9" width="6" height="5" rx="1.5" stroke="#9CA3AF" stroke-width="1.5"/></svg>
          </div>
          <span class="nav-label">Playlists</span>
        </div>
        <div class="nav-item">
          <div class="nav-icon">
            <svg width="16" height="14" viewBox="0 0 16 14" fill="none"><path d="M8 1v8M5 6l3 3 3-3" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 10v1.5A1.5 1.5 0 002.5 13h11a1.5 1.5 0 001.5-1.5V10" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
          <span class="nav-label">Downloads</span>
        </div>
      </div>
    </div>

    <!-- Main content -->
    <div class="main-content">
      <div class="song-list-area">
        <div class="list-header">42 songs</div>
        <div class="song-row active">
          <div class="song-thumb blinding"></div>
          <div class="song-info">
            <div class="song-title active-text">Blinding Lights</div>
            <div class="song-artist">The Weeknd</div>
          </div>
        </div>
        <div class="song-row">
          <div class="song-thumb starboy"></div>
          <div class="song-info">
            <div class="song-title">Starboy</div>
            <div class="song-artist">The Weeknd</div>
          </div>
        </div>
        <div class="song-row">
          <div class="song-thumb save"></div>
          <div class="song-info">
            <div class="song-title">Save Your Tears</div>
            <div class="song-artist">The Weeknd</div>
          </div>
        </div>
      </div>

      <!-- Player panel -->
      <div class="player-panel">
        <div class="player-thumb"></div>
        <div class="player-info">
          <div class="player-title">Blinding Lights</div>
          <div class="player-artist-album">The Weeknd · After Hours</div>
        </div>
        <div class="player-progress">
          <div class="controls-row">
            <!-- Shuffle -->
            <div class="ctrl-btn"><svg width="18" height="14" viewBox="0 0 18 14" fill="none"><path d="M1 3h3a4 4 0 013.2 1.6l3.6 5.2A4 4 0 0014 11h3M11 8l3 3-3 3M1 11h3a4 4 0 003.2-1.6l.8-1.1M11 1l3 3-3 3" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <!-- Prev -->
            <div class="ctrl-btn"><svg width="18" height="16" viewBox="0 0 18 16" fill="white"><path d="M4 1v14M16 1L7 8l9 7V1z"/></svg></div>
            <!-- Play/Pause -->
            <div class="play-btn"><svg width="18" height="18" viewBox="0 0 18 18" fill="white"><rect x="4" y="3" width="3.5" height="12" rx="1.5"/><rect x="10.5" y="3" width="3.5" height="12" rx="1.5"/></svg></div>
            <!-- Next -->
            <div class="ctrl-btn"><svg width="18" height="16" viewBox="0 0 18 16" fill="white"><path d="M14 1v14M2 1l9 7-9 7V1z"/></svg></div>
            <!-- Repeat -->
            <div class="ctrl-btn"><svg width="18" height="14" viewBox="0 0 18 14" fill="none"><path d="M14 1l3 3-3 3M1 5h14a2 2 0 012 2M4 13l-3-3 3-3M17 9H3a2 2 0 01-2-2" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          </div>
          <div class="progress-bar">
            <div class="progress-fill"><div class="progress-thumb-dot"></div></div>
          </div>
          <div class="time-row">
            <span class="time-text">1:24</span>
            <span class="time-text">-2:13</span>
          </div>
        </div>
        <!-- Extra icons -->
        <div style="display:flex; gap:16px; align-items:center;">
          <div class="ctrl-btn"><svg width="18" height="14" viewBox="0 0 18 14" fill="none"><path d="M1 1h10M1 5h10M1 9h6" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/><path d="M13 10l4 3-4 3V10z" fill="#9CA3AF"/></svg></div>
          <div class="ctrl-btn"><svg width="14" height="18" viewBox="0 0 14 18" fill="none"><rect x="4" y="1" width="6" height="9" rx="3" stroke="#9CA3AF" stroke-width="1.5"/><path d="M1 8a6 6 0 0012 0M7 14v4" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/></svg></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
