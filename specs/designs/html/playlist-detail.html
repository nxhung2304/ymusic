<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>Ymusic – Playlist Detail</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; }
    .phone { width: 390px; height: 844px; background: #0A0A0A; border-radius: 44px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 40px 120px rgba(0,0,0,0.8); position: relative; }
    /* Hero gradient */
    .hero-bg {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 260px;
      background: linear-gradient(160deg, #312E81, #7C3AED, #A78BFA);
      z-index: 0;
    }
    .hero-fade {
      position: absolute;
      top: 100px; left: 0; right: 0;
      height: 160px;
      background: linear-gradient(transparent, #0A0A0A);
      z-index: 1;
    }
    /* Status bar */
    .status-bar { height: 44px; padding: 14px 24px 0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; position: relative; z-index: 2; }
    .status-time { font-size: 15px; font-weight: 600; color: #FFFFFF; }
    .status-icons { display: flex; align-items: center; gap: 6px; }
    /* Top nav */
    .top-nav { padding: 6px 20px 0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; position: relative; z-index: 2; }
    .nav-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    /* Playlist info */
    .playlist-info { padding: 80px 20px 16px; position: relative; z-index: 2; flex-shrink: 0; }
    .playlist-title { font-size: 26px; font-weight: 700; color: #FFFFFF; letter-spacing: -0.3px; }
    .playlist-meta { font-size: 13px; color: #9CA3AF; margin-top: 4px; }
    /* Action buttons */
    .action-row { padding: 0 20px 16px; display: flex; gap: 12px; position: relative; z-index: 2; flex-shrink: 0; }
    .action-btn { flex: 1; height: 44px; border-radius: 24px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; }
    .play-all-btn { background: #7C3AED; color: #FFFFFF; }
    .shuffle-btn { background: transparent; border: 1.5px solid rgba(255,255,255,0.2); color: #FFFFFF; }
    /* Song list */
    .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; position: relative; z-index: 2; }
    .scroll-area::-webkit-scrollbar { display: none; }
    .song-list { padding: 0 20px; }
    .song-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; cursor: pointer; }
    .song-item:hover { background: rgba(255,255,255,0.04); border-radius: 10px; }
    .song-thumb { width: 44px; height: 44px; border-radius: 8px; flex-shrink: 0; }
    .song-thumb.blinding { background: linear-gradient(135deg, #3B1FA8, #7C3AED); }
    .song-thumb.asit { background: linear-gradient(135deg, #166534, #15803D); }
    .song-thumb.midnight { background: linear-gradient(135deg, #1D4ED8, #3B82F6); }
    .song-thumb.levitating { background: linear-gradient(135deg, #0E7490, #06B6D4); }
    .song-info { flex: 1; min-width: 0; }
    .song-title { font-size: 14px; font-weight: 600; color: #FFFFFF; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-artist { font-size: 12px; color: #6B7280; margin-top: 2px; }
    .song-duration { font-size: 12px; color: #6B7280; flex-shrink: 0; }
    .song-menu { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="phone" data-widget="Scaffold">
    <div class="hero-bg" data-widget="Container" data-decoration="gradientBackground"></div>
    <div class="hero-fade"></div>

    <div class="status-bar" data-widget="SafeArea">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M8 9.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3zM1.5 4.5a9 9 0 0113 0l-1.5 1.5a7 7 0 00-10 0L1.5 4.5zM4.5 7.5a5 5 0 017 0l-1.5 1.5a3 3 0 00-4 0L4.5 7.5zM.5 1.5A12 12 0 0115.5 1.5L14 3A10 10 0 002 3L.5 1.5z"/></svg>
        <svg width="20" height="12" viewBox="0 0 20 12" fill="none"><rect x="0.5" y="0.5" width="16" height="11" rx="2.5" stroke="white" stroke-opacity="0.35"/><rect x="2" y="2" width="11" height="8" rx="1.5" fill="white"/><path d="M17.5 4v4a1.5 1.5 0 000-4z" fill="white" fill-opacity="0.4"/></svg>
      </div>
    </div>
    <div class="top-nav" data-widget="Row">
      <div class="nav-btn" data-widget="IconButton" data-icon="keyboard_arrow_down" data-on-tap="pop" onclick="history.back()" style="cursor:pointer;"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M13 4L7 10l6 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="nav-btn"><svg width="20" height="4" viewBox="0 0 20 4" fill="white"><circle cx="2" cy="2" r="2"/><circle cx="10" cy="2" r="2"/><circle cx="18" cy="2" r="2"/></svg></div>
    </div>

    <div class="playlist-info" data-widget="Column">
      <div class="playlist-title" data-widget="Text" data-style="headlineMedium">Chill Vibes</div>
      <div class="playlist-meta" data-widget="Text" data-style="bodyMedium">24 songs · 1h 32m</div>
    </div>

    <div class="action-row" data-widget="Row">
      <button class="action-btn play-all-btn" data-widget="ElevatedButton" data-on-tap="playAll" onclick="location.href='full-player.html'">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="white"><path d="M3 2l9 5-9 5V2z"/></svg>
        Play All
      </button>
      <button class="action-btn shuffle-btn" data-widget="OutlinedButton" data-on-tap="shufflePlay" onclick="location.href='full-player.html'">
        <svg width="16" height="13" viewBox="0 0 16 13" fill="none"><path d="M1 3h2.5a3.5 3.5 0 012.8 1.4l3.4 4.8A3.5 3.5 0 0012.5 11H15M12 8l3 3-3 3M1 11h2.5a3.5 3.5 0 002.8-1.4l.8-1.1M12 0l3 3-3 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Shuffle
      </button>
    </div>

    <div class="scroll-area" data-widget="ListView" data-scroll="vertical">
      <div class="song-list" data-widget="Column">
        <div class="song-item" data-widget="SongTile" data-on-tap="playSong" onclick="location.href='full-player.html'">
          <div class="song-thumb blinding" data-widget="CachedNetworkImage" data-slot="leading"></div>
          <div class="song-info" data-widget="Column" data-slot="content"><div class="song-title" data-widget="Text" data-style="titleSmall" data-slot="title">Blinding Lights</div><div class="song-artist" data-widget="Text" data-style="bodySmall" data-slot="subtitle">The Weeknd</div></div>
          <span class="song-duration" data-widget="Text" data-style="bodySmall" data-slot="trailing">3:20</span>
          <div class="song-menu" data-widget="IconButton" data-icon="more_vert" data-slot="trailing" data-on-tap="showSongMenu"><svg width="4" height="16" viewBox="0 0 4 16" fill="#6B7280"><circle cx="2" cy="2" r="1.5"/><circle cx="2" cy="8" r="1.5"/><circle cx="2" cy="14" r="1.5"/></svg></div>
        </div>
        <div class="song-item" data-widget="SongTile" data-on-tap="playSong" onclick="location.href='full-player.html'">
          <div class="song-thumb asit" data-widget="CachedNetworkImage" data-slot="leading"></div>
          <div class="song-info" data-widget="Column" data-slot="content"><div class="song-title" data-widget="Text" data-style="titleSmall" data-slot="title">As It Was</div><div class="song-artist" data-widget="Text" data-style="bodySmall" data-slot="subtitle">Harry Styles</div></div>
          <span class="song-duration" data-widget="Text" data-style="bodySmall" data-slot="trailing">2:37</span>
          <div class="song-menu" data-widget="IconButton" data-icon="more_vert" data-slot="trailing" data-on-tap="showSongMenu"><svg width="4" height="16" viewBox="0 0 4 16" fill="#6B7280"><circle cx="2" cy="2" r="1.5"/><circle cx="2" cy="8" r="1.5"/><circle cx="2" cy="14" r="1.5"/></svg></div>
        </div>
        <div class="song-item" data-widget="SongTile" data-on-tap="playSong" onclick="location.href='full-player.html'">
          <div class="song-thumb midnight" data-widget="CachedNetworkImage" data-slot="leading"></div>
          <div class="song-info" data-widget="Column" data-slot="content"><div class="song-title" data-widget="Text" data-style="titleSmall" data-slot="title">Midnight Rain</div><div class="song-artist" data-widget="Text" data-style="bodySmall" data-slot="subtitle">Taylor Swift</div></div>
          <span class="song-duration" data-widget="Text" data-style="bodySmall" data-slot="trailing">3:56</span>
          <div class="song-menu" data-widget="IconButton" data-icon="more_vert" data-slot="trailing" data-on-tap="showSongMenu"><svg width="4" height="16" viewBox="0 0 4 16" fill="#6B7280"><circle cx="2" cy="2" r="1.5"/><circle cx="2" cy="8" r="1.5"/><circle cx="2" cy="14" r="1.5"/></svg></div>
        </div>
        <div class="song-item" data-widget="SongTile" data-on-tap="playSong" onclick="location.href='full-player.html'">
          <div class="song-thumb levitating" data-widget="CachedNetworkImage" data-slot="leading"></div>
          <div class="song-info" data-widget="Column" data-slot="content"><div class="song-title" data-widget="Text" data-style="titleSmall" data-slot="title">Levitating</div><div class="song-artist" data-widget="Text" data-style="bodySmall" data-slot="subtitle">Dua Lipa</div></div>
          <span class="song-duration" data-widget="Text" data-style="bodySmall" data-slot="trailing">3:23</span>
          <div class="song-menu" data-widget="IconButton" data-icon="more_vert" data-slot="trailing" data-on-tap="showSongMenu"><svg width="4" height="16" viewBox="0 0 4 16" fill="#6B7280"><circle cx="2" cy="2" r="1.5"/><circle cx="2" cy="8" r="1.5"/><circle cx="2" cy="14" r="1.5"/></svg></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
