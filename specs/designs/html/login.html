<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>Ymusic – Login Screen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }

    .phone {
      width: 390px;
      height: 844px;
      background: #08000E;
      border-radius: 44px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 40px 120px rgba(0,0,0,0.8);
    }

    /* Purple radial glow – top center */
    .phone::before {
      content: '';
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 360px;
      height: 360px;
      background: radial-gradient(circle, rgba(100, 30, 180, 0.55) 0%, rgba(80, 20, 150, 0.25) 45%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    /* Hero content */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 32px;
      position: relative;
      z-index: 1;
      gap: 12px;
    }

    .icon {
      width: 44px;
      height: 44px;
      margin-bottom: 4px;
    }

    .icon svg {
      width: 100%;
      height: 100%;
    }

    .app-name {
      font-size: 30px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.3px;
    }

    .tagline {
      font-size: 14px;
      color: #9CA3AF;
      font-weight: 400;
    }

    /* Bottom section */
    .bottom {
      padding: 0 24px 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    .legal-text {
      font-size: 11px;
      color: #6B7280;
      text-align: center;
      line-height: 1.5;
    }

    .legal-text a {
      color: #9CA3AF;
      text-decoration: underline;
    }

    .google-btn {
      width: 100%;
      height: 52px;
      background: #FFFFFF;
      border: none;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      color: #1F2937;
      letter-spacing: 0.1px;
      transition: background 0.2s;
    }

    .google-btn:hover {
      background: #F3F4F6;
    }

    .google-logo {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>
  <div class="phone" data-widget="Scaffold">
    <!-- Hero -->
    <div class="hero" data-widget="Column">
      <div class="icon" data-widget="SvgPicture">
        <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 33V12l20-3.6v20" stroke="#8B5CF6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="33" r="4" stroke="#8B5CF6" stroke-width="2.2"/>
          <circle cx="32" cy="29.4" r="4" stroke="#8B5CF6" stroke-width="2.2"/>
        </svg>
      </div>
      <h1 class="app-name" data-widget="Text" data-style="headlineLarge">Ymusic</h1>
      <p class="tagline" data-widget="Text" data-style="bodyMedium">Your personal music universe</p>
    </div>

    <!-- Bottom -->
    <div class="bottom" data-widget="Column">
      <p class="legal-text" data-widget="Text" data-style="bodySmall">
        By continuing, you agree to our <a href="#">Terms of Service</a><br/>
        and <a href="#">Privacy Policy</a>
      </p>

      <button class="google-btn" data-widget="ElevatedButton" data-on-tap="signInWithGoogle" data-provider="authProvider" onclick="location.href='home.html'">
        <!-- Google "G" logo SVG -->
        <svg class="google-logo" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <path d="M19.6 10.23c0-.68-.06-1.36-.18-2H10v3.78h5.4a4.62 4.62 0 01-2 3.03v2.52h3.24c1.9-1.75 3-4.33 3-7.33z" fill="#4285F4"/>
          <path d="M10 20c2.7 0 4.97-.9 6.62-2.44l-3.24-2.52c-.9.6-2.04.96-3.38.96-2.6 0-4.8-1.75-5.59-4.1H1.09v2.6A9.99 9.99 0 0010 20z" fill="#34A853"/>
          <path d="M4.41 11.9A6.01 6.01 0 014.1 10c0-.66.11-1.3.31-1.9V5.5H1.09A9.99 9.99 0 000 10c0 1.62.39 3.15 1.09 4.5l3.32-2.6z" fill="#FBBC05"/>
          <path d="M10 3.96c1.47 0 2.79.5 3.83 1.5l2.87-2.87A9.94 9.94 0 0010 0 9.99 9.99 0 001.09 5.5l3.32 2.6C5.2 5.71 7.4 3.96 10 3.96z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </div>
  </div>
</body>
</html>
