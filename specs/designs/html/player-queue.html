<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>Ymusic – Player Queue</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }
    .phone {
      width: 390px;
      height: 844px;
      background: #08000F;
      border-radius: 44px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 40px 120px rgba(0,0,0,0.8);
    }
    .status-bar {
      height: 44px;
      padding: 14px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .status-time { font-size: 15px; font-weight: 600; color: #FFFFFF; }
    .status-icons { display: flex; align-items: center; gap: 6px; }

    .top-nav {
      padding: 8px 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .nav-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .nav-title { font-size: 15px; font-weight: 600; color: #FFFFFF; }
    .clear-btn { font-size: 14px; color: #9CA3AF; cursor: pointer; }

    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      scrollbar-width: none;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #6B7280;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* Now playing row – highlighted */
    .song-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      margin-bottom: 2px;
    }
    .song-item.now-playing {
      background: rgba(124, 58, 237, 0.15);
      border: 1px solid rgba(124, 58, 237, 0.25);
    }

    .drag-handle {
      width: 16px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-shrink: 0;
      opacity: 0.4;
    }
    .drag-handle span { display: block; width: 100%; height: 2px; background: #9CA3AF; border-radius: 1px; }

    .song-thumb {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .song-thumb.blinding { background: linear-gradient(135deg, #3B1FA8, #7C3AED); }
    .song-thumb.asit { background: linear-gradient(135deg, #166534, #15803D); }
    .song-thumb.midnight { background: linear-gradient(135deg, #1D4ED8, #3B82F6); }
    .song-thumb.antihero { background: linear-gradient(135deg, #B45309, #D97706); }
    .song-thumb.cruel { background: linear-gradient(135deg, #DC2626, #EF4444); }

    .song-info { flex: 1; min-width: 0; }
    .song-title { font-size: 14px; font-weight: 600; color: #FFFFFF; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-meta { font-size: 12px; color: #6B7280; margin-top: 2px; }
    .song-title.active { color: #A78BFA; }

    .playing-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .up-next-label {
      margin-top: 20px;
      margin-bottom: 8px;
    }

    /* Player tabs */
    .player-tabs {
      padding: 12px 24px 0;
      display: flex;
      gap: 24px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .player-tab {
      font-size: 14px;
      font-weight: 600;
      color: #6B7280;
      padding-bottom: 12px;
      cursor: pointer;
      position: relative;
    }
    .player-tab.active { color: #FFFFFF; }
    .player-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: #FFFFFF;
      border-radius: 1px;
    }
    .safe-area { height: 32px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="phone" data-widget="Scaffold">
    <div class="status-bar" data-widget="SafeArea">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M8 9.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3zM1.5 4.5a9 9 0 0113 0l-1.5 1.5a7 7 0 00-10 0L1.5 4.5zM4.5 7.5a5 5 0 017 0l-1.5 1.5a3 3 0 00-4 0L4.5 7.5zM.5 1.5A12 12 0 0115.5 1.5L14 3A10 10 0 002 3L.5 1.5z"/></svg>
        <svg width="20" height="12" viewBox="0 0 20 12" fill="none"><rect x="0.5" y="0.5" width="16" height="11" rx="2.5" stroke="white" stroke-opacity="0.35"/><rect x="2" y="2" width="11" height="8" rx="1.5" fill="white"/><path d="M17.5 4v4a1.5 1.5 0 000-4z" fill="white" fill-opacity="0.4"/></svg>
      </div>
    </div>

    <div class="top-nav" data-widget="Row">
      <div class="nav-btn" data-widget="IconButton" data-icon="keyboard_arrow_down" data-on-tap="pop" onclick="location.href='full-player.html'" style="cursor:pointer;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="nav-title" data-widget="Text" data-style="titleMedium">Queue</span>
      <span class="clear-btn">Clear</span>
    </div>

    <div class="scroll-area" data-widget="ReorderableListView" data-provider="queueProvider">
      <!-- Now Playing -->
      <div class="section-label" data-widget="Text" data-style="labelSmall">Now Playing</div>
      <div class="song-item now-playing" data-widget="SongTile" data-state="active">
        <div class="song-thumb blinding" data-widget="CachedNetworkImage" data-slot="leading"></div>
        <div class="song-info" data-widget="Column" data-slot="content">
          <div class="song-title active">Blinding Lights</div>
          <div class="song-meta">The Weeknd · 3:20</div>
        </div>
        <div class="playing-icon">
          <!-- Speaker/sound wave icon -->
          <svg width="18" height="16" viewBox="0 0 18 16" fill="none">
            <path d="M2 5h3l5-4v14l-5-4H2V5z" fill="#A78BFA"/>
            <path d="M13 3a6 6 0 010 10M15 1a9 9 0 010 14" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
      </div>

      <!-- Up Next -->
      <div class="section-label up-next-label" data-widget="Text" data-style="labelSmall">Up Next</div>

      <div class="song-item" data-widget="SongTile" data-on-tap="playSong">
        <div class="drag-handle" data-widget="ReorderableDragStartListener"><span></span><span></span><span></span></div>
        <div class="song-thumb asit" data-widget="CachedNetworkImage" data-slot="leading"></div>
        <div class="song-info" data-widget="Column" data-slot="content">
          <div class="song-title" data-widget="Text" data-style="titleSmall" data-slot="title">As It Was</div>
          <div class="song-meta" data-widget="Text" data-style="bodySmall" data-slot="subtitle">Harry Styles · 2:37</div>
        </div>
      </div>

      <div class="song-item" data-widget="SongTile" data-on-tap="playSong">
        <div class="drag-handle" data-widget="ReorderableDragStartListener"><span></span><span></span><span></span></div>
        <div class="song-thumb midnight" data-widget="CachedNetworkImage" data-slot="leading"></div>
        <div class="song-info" data-widget="Column" data-slot="content">
          <div class="song-title" data-widget="Text" data-style="titleSmall" data-slot="title">Midnight Rain</div>
          <div class="song-meta" data-widget="Text" data-style="bodySmall" data-slot="subtitle">Taylor Swift · 3:56</div>
        </div>
      </div>

      <div class="song-item" data-widget="SongTile" data-on-tap="playSong">
        <div class="drag-handle" data-widget="ReorderableDragStartListener"><span></span><span></span><span></span></div>
        <div class="song-thumb antihero" data-widget="CachedNetworkImage" data-slot="leading"></div>
        <div class="song-info" data-widget="Column" data-slot="content">
          <div class="song-title" data-widget="Text" data-style="titleSmall" data-slot="title">Anti-Hero</div>
          <div class="song-meta" data-widget="Text" data-style="bodySmall" data-slot="subtitle">Taylor Swift · 3:20</div>
        </div>
      </div>

      <div class="song-item" data-widget="SongTile" data-on-tap="playSong">
        <div class="drag-handle" data-widget="ReorderableDragStartListener"><span></span><span></span><span></span></div>
        <div class="song-thumb cruel" data-widget="CachedNetworkImage" data-slot="leading"></div>
        <div class="song-info" data-widget="Column" data-slot="content">
          <div class="song-title" data-widget="Text" data-style="titleSmall" data-slot="title">Cruel Summer</div>
          <div class="song-meta" data-widget="Text" data-style="bodySmall" data-slot="subtitle">Taylor Swift · 2:58</div>
        </div>
      </div>
    </div>

    <div class="player-tabs" data-widget="TabBar" data-tabs="Player,Lyrics,Queue">
      <div class="player-tab" data-widget="Tab" onclick="location.href='full-player.html'" style="cursor:pointer;">Player</div>
      <div class="player-tab" data-widget="Tab" onclick="location.href='player-lyrics.html'" style="cursor:pointer;">Lyrics</div>
      <div class="player-tab active" data-widget="Tab">Queue</div>
    </div>
    <div class="safe-area"></div>
  </div>
</body>
</html>
