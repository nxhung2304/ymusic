<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>Ymusic – Splash Screen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }

    .phone {
      width: 390px;
      height: 844px;
      background: #0A0010;
      border-radius: 44px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 40px 120px rgba(0,0,0,0.8);
    }

    /* Purple radial glow in center */
    .phone::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 340px;
      height: 340px;
      background: radial-gradient(circle, rgba(100, 30, 180, 0.65) 0%, rgba(80, 20, 150, 0.3) 40%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .icon {
      width: 48px;
      height: 48px;
      margin-bottom: 4px;
    }

    .icon svg {
      width: 100%;
      height: 100%;
    }

    .app-name {
      font-size: 32px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 14px;
      color: #9CA3AF;
      font-weight: 400;
      letter-spacing: 0.1px;
    }

    .dot-indicator {
      position: absolute;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      background: #6D28D9;
      border-radius: 50%;
    }

    .phone { cursor: pointer; }
  </style>
</head>
<body>
  <script>
    // Auto-navigate to login after 2s (simulates real splash)
    setTimeout(() => { location.href = 'login.html'; }, 2000);
  </script>
  <div class="phone" data-widget="Scaffold" onclick="location.href='login.html'">
    <div class="content" data-widget="Column">
      <!-- Music note icon -->
      <div class="icon" data-widget="SvgPicture">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 36V14l22-4v22" stroke="#8B5CF6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="14" cy="36" r="4" stroke="#8B5CF6" stroke-width="2.5"/>
          <circle cx="36" cy="32" r="4" stroke="#8B5CF6" stroke-width="2.5"/>
        </svg>
      </div>

      <h1 class="app-name" data-widget="Text" data-style="headlineLarge">Ymusic</h1>
      <p class="tagline" data-widget="Text" data-style="bodyMedium">Stream music, no limits</p>
    </div>

    <div class="dot-indicator" data-widget="CircularProgressIndicator"></div>
  </div>
</body>
</html>
