<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>Ymusic – Library Playlists</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; }
    .phone { width: 390px; height: 844px; background: #0D0D0D; border-radius: 44px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 40px 120px rgba(0,0,0,0.8); }
    .status-bar { height: 44px; padding: 14px 24px 0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .status-time { font-size: 15px; font-weight: 600; color: #FFFFFF; }
    .status-icons { display: flex; align-items: center; gap: 6px; }
    .page-header { padding: 12px 20px 8px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .page-title { font-size: 28px; font-weight: 700; color: #FFFFFF; letter-spacing: -0.5px; }
    .add-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .filter-tabs { padding: 0 20px 4px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .filter-tab { flex-shrink: 0; height: 32px; padding: 0 16px; border-radius: 20px; background: #1C1C1E; border: none; font-size: 13px; font-weight: 600; color: #9CA3AF; cursor: pointer; font-family: inherit; }
    .filter-tab.active { background: #7C3AED; color: #FFFFFF; }
    .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; padding: 16px 20px; }
    .scroll-area::-webkit-scrollbar { display: none; }
    .playlist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .playlist-card { cursor: pointer; }
    .playlist-card:hover { opacity: 0.85; }
    .playlist-art { width: 100%; aspect-ratio: 1/1.3; border-radius: 12px; margin-bottom: 8px; }
    .playlist-art.chill { background: linear-gradient(160deg, #4C1D95, #7C3AED, #A855F7); }
    .playlist-art.summer { background: linear-gradient(160deg, #92400E, #D97706, #F59E0B); }
    .playlist-art.focus { background: linear-gradient(160deg, #1E3A8A, #2563EB, #3B82F6); }
    .playlist-art.latenight { background: linear-gradient(160deg, #581C87, #9333EA, #C084FC); }
    .playlist-name { font-size: 14px; font-weight: 600; color: #FFFFFF; }
    .playlist-count { font-size: 12px; color: #6B7280; margin-top: 2px; }
    .mini-player { background: #1C1C1E; border-top: 1px solid rgba(255,255,255,0.06); padding: 10px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .mini-thumb { width: 40px; height: 40px; border-radius: 6px; background: #2A2A2A; flex-shrink: 0; }
    .mini-info { flex: 1; min-width: 0; }
    .mini-title { font-size: 13px; font-weight: 600; color: #FFFFFF; }
    .mini-artist { font-size: 11px; color: #9CA3AF; margin-top: 1px; }
    .mini-controls { display: flex; align-items: center; gap: 16px; }
    .tab-bar { background: #111111; border-top: 1px solid rgba(255,255,255,0.05); padding: 10px 0 28px; display: flex; justify-content: space-around; align-items: center; flex-shrink: 0; }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; min-width: 80px; }
    .tab-icon-wrap { width: 64px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 20px; }
    .tab-item.active .tab-icon-wrap { background: #7C3AED; }
    .tab-label { font-size: 10px; font-weight: 600; color: #6B7280; letter-spacing: 0.5px; text-transform: uppercase; }
    .tab-item.active .tab-label { color: #FFFFFF; }
  </style>
</head>
<body>
  <div class="phone" data-widget="Scaffold">
    <div class="status-bar" data-widget="SafeArea">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M8 9.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3zM1.5 4.5a9 9 0 0113 0l-1.5 1.5a7 7 0 00-10 0L1.5 4.5zM4.5 7.5a5 5 0 017 0l-1.5 1.5a3 3 0 00-4 0L4.5 7.5zM.5 1.5A12 12 0 0115.5 1.5L14 3A10 10 0 002 3L.5 1.5z"/></svg>
        <svg width="20" height="12" viewBox="0 0 20 12" fill="none"><rect x="0.5" y="0.5" width="16" height="11" rx="2.5" stroke="white" stroke-opacity="0.35"/><rect x="2" y="2" width="11" height="8" rx="1.5" fill="white"/><path d="M17.5 4v4a1.5 1.5 0 000-4z" fill="white" fill-opacity="0.4"/></svg>
      </div>
    </div>
    <div class="page-header" data-widget="Row">
      <h1 class="page-title" data-widget="Text" data-style="headlineLarge">Library</h1>
      <div class="add-btn"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 4v14M4 11h14" stroke="white" stroke-width="2" stroke-linecap="round"/></svg></div>
    </div>
    <div class="filter-tabs" data-widget="SingleChildScrollView" data-scroll="horizontal">
      <button class="filter-tab" data-widget="FilterChip" data-on-tap="switchLibraryTab" onclick="location.href='library.html'">Liked</button>
      <button class="filter-tab" data-widget="FilterChip" data-on-tap="switchLibraryTab" onclick="location.href='library-history.html'">History</button>
      <button class="filter-tab active" data-widget="FilterChip" data-on-tap="switchLibraryTab">Playlists</button>
      <button class="filter-tab" data-widget="FilterChip" data-on-tap="switchLibraryTab" onclick="location.href='library-downloads.html'">Downloads</button>
      <button class="filter-tab" data-widget="FilterChip" data-on-tap="switchLibraryTab" onclick="location.href='library-podcasts.html'">Pods</button>
    </div>
    <div class="scroll-area" data-widget="ListView" data-scroll="vertical">
      <div class="playlist-grid" data-widget="GridView" data-columns="2">
        <div class="playlist-card" data-widget="PlaylistCard" data-on-tap="openPlaylist" onclick="location.href='playlist-detail.html'">
          <div class="playlist-art chill" data-widget="ClipRRect"></div>
          <div class="playlist-name" data-widget="Text" data-style="titleSmall">Chill Vibes</div>
          <div class="playlist-count" data-widget="Text" data-style="bodySmall">24 songs</div>
        </div>
        <div class="playlist-card" data-widget="PlaylistCard" data-on-tap="openPlaylist" onclick="location.href='playlist-detail.html'">
          <div class="playlist-art summer" data-widget="ClipRRect"></div>
          <div class="playlist-name" data-widget="Text" data-style="titleSmall">Summer Hits</div>
          <div class="playlist-count" data-widget="Text" data-style="bodySmall">18 songs</div>
        </div>
        <div class="playlist-card" data-widget="PlaylistCard" data-on-tap="openPlaylist" onclick="location.href='playlist-detail.html'">
          <div class="playlist-art focus" data-widget="ClipRRect"></div>
          <div class="playlist-name" data-widget="Text" data-style="titleSmall">Focus Flow</div>
          <div class="playlist-count" data-widget="Text" data-style="bodySmall">12 songs</div>
        </div>
        <div class="playlist-card" data-widget="PlaylistCard" data-on-tap="openPlaylist" onclick="location.href='playlist-detail.html'">
          <div class="playlist-art latenight" data-widget="ClipRRect"></div>
          <div class="playlist-name" data-widget="Text" data-style="titleSmall">Late Night</div>
          <div class="playlist-count" data-widget="Text" data-style="bodySmall">9 songs</div>
        </div>
      </div>
    </div>
    <div class="mini-player" data-widget="MiniPlayerWidget" data-provider="playerProvider" data-on-tap="openFullPlayer" style="cursor:pointer;" onclick="location.href='full-player.html'">
      <div class="mini-thumb" data-widget="CachedNetworkImage" data-slot="leading"></div>
      <div class="mini-info" data-widget="Column" data-slot="content"><div class="mini-title" data-widget="Text" data-style="titleSmall">Song Title</div><div class="mini-artist" data-widget="Text" data-style="bodySmall">Artist Name</div></div>
      <div class="mini-controls" data-widget="Row" data-slot="trailing">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="white"><path d="M8 5l10 6-10 6V5z"/></svg>
        <svg width="22" height="22" viewBox="0 0 22 22" fill="white"><path d="M6 5l8 6-8 6V5z"/><rect x="15" y="5" width="2" height="12" rx="1"/></svg>
      </div>
    </div>
    <div class="tab-bar" data-widget="BottomNavigationBar" data-provider="navigationProvider">
      <div class="tab-item" data-widget="BottomNavigationBarItem" onclick="location.href='home.html'"><div class="tab-icon-wrap"><svg width="18" height="18" viewBox="0 0 18 18"><path d="M1 7L9 1l8 6v9a1 1 0 01-1 1h-4v-5H6v5H2a1 1 0 01-1-1V7z" fill="#6B7280"/></svg></div><span class="tab-label" data-widget="Text" data-style="labelSmall">Home</span></div>
      <div class="tab-item" data-widget="BottomNavigationBarItem" onclick="location.href='search.html'"><div class="tab-icon-wrap"><svg width="18" height="18" viewBox="0 0 18 18"><circle cx="8" cy="8" r="6" stroke="#6B7280" stroke-width="2" fill="none"/><path d="M13 13l4 4" stroke="#6B7280" stroke-width="2" stroke-linecap="round" fill="none"/></svg></div><span class="tab-label" data-widget="Text" data-style="labelSmall">Search</span></div>
      <div class="tab-item active" data-widget="BottomNavigationBarItem"><div class="tab-icon-wrap"><svg width="18" height="18" viewBox="0 0 18 18"><path d="M3 2h12a1 1 0 011 1v12a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="white" stroke-width="1.5" fill="none"/><path d="M6 7h6M6 10h6M6 13h4" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg></div><span class="tab-label" data-widget="Text" data-style="labelSmall">Library</span></div>
    </div>
  </div>
</body>
</html>
