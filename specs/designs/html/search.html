<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>Ymusic – Search Screen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }

    .phone {
      width: 390px;
      height: 844px;
      background: #0D0D0D;
      border-radius: 44px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 40px 120px rgba(0,0,0,0.8);
    }

    /* Status bar */
    .status-bar {
      height: 44px;
      padding: 14px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .status-time {
      font-size: 15px;
      font-weight: 600;
      color: #FFFFFF;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Search bar */
    .search-bar-wrap {
      padding: 12px 20px;
      flex-shrink: 0;
    }

    .search-bar {
      background: #1C1C1E;
      border-radius: 12px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .search-icon svg { fill: #6B7280; flex-shrink: 0; }
    .search-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-size: 15px;
      color: #9CA3AF;
      font-family: inherit;
    }

    .mic-icon svg { fill: #6B7280; flex-shrink: 0; }

    /* Scroll area */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
    }

    .scroll-area::-webkit-scrollbar { display: none; }

    /* Section title */
    .section-header {
      padding: 4px 20px 12px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.3px;
    }

    /* Song list */
    .song-list {
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .song-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      cursor: pointer;
    }

    .song-item:hover { background: rgba(255,255,255,0.04); border-radius: 10px; }

    .song-thumb {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .song-thumb.blinding { background: linear-gradient(135deg, #3B1FA8, #7C3AED); }
    .song-thumb.asit { background: linear-gradient(135deg, #166534, #15803D); }
    .song-thumb.midnight { background: linear-gradient(135deg, #1D4ED8, #3B82F6); }
    .song-thumb.antihero { background: linear-gradient(135deg, #B45309, #D97706); }
    .song-thumb.cruel { background: linear-gradient(135deg, #DC2626, #EF4444); }
    .song-thumb.stay { background: linear-gradient(135deg, #0891B2, #06B6D4); }

    .song-info {
      flex: 1;
      min-width: 0;
    }

    .song-title {
      font-size: 14px;
      font-weight: 600;
      color: #FFFFFF;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-meta {
      font-size: 12px;
      color: #6B7280;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-duration {
      font-size: 12px;
      color: #6B7280;
      flex-shrink: 0;
    }

    .song-menu {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    .song-menu svg { fill: #6B7280; }

    /* Mini player */
    .mini-player {
      background: #1C1C1E;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .mini-thumb {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      background: #2A2A2A;
      flex-shrink: 0;
    }

    .mini-info {
      flex: 1;
      min-width: 0;
    }

    .mini-title {
      font-size: 13px;
      font-weight: 600;
      color: #FFFFFF;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini-artist {
      font-size: 11px;
      color: #9CA3AF;
      margin-top: 1px;
    }

    .mini-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .mini-controls svg { fill: #FFFFFF; cursor: pointer; }

    /* Tab bar */
    .tab-bar {
      background: #111111;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding: 10px 0 28px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      flex-shrink: 0;
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      min-width: 80px;
    }

    .tab-icon-wrap {
      width: 64px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      transition: background 0.2s;
    }

    .tab-item.active .tab-icon-wrap {
      background: #7C3AED;
    }

    .tab-icon-wrap svg { fill: #6B7280; }
    .tab-item.active .tab-icon-wrap svg { fill: #FFFFFF; }

    .tab-label {
      font-size: 10px;
      font-weight: 600;
      color: #6B7280;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .tab-item.active .tab-label { color: #FFFFFF; }
  </style>
</head>
<body>
  <div class="phone" data-widget="Scaffold">
    <!-- Status bar -->
    <div class="status-bar" data-widget="SafeArea">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="white">
          <path d="M8 9.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3zM1.5 4.5a9 9 0 0113 0l-1.5 1.5a7 7 0 00-10 0L1.5 4.5zM4.5 7.5a5 5 0 017 0l-1.5 1.5a3 3 0 00-4 0L4.5 7.5zM.5 1.5A12 12 0 0115.5 1.5L14 3A10 10 0 002 3L.5 1.5z" fill-rule="evenodd"/>
        </svg>
        <svg width="20" height="12" viewBox="0 0 20 12" fill="none">
          <rect x="0.5" y="0.5" width="16" height="11" rx="2.5" stroke="white" stroke-opacity="0.35"/>
          <rect x="2" y="2" width="11" height="8" rx="1.5" fill="white"/>
          <path d="M17.5 4v4a1.5 1.5 0 000-4z" fill="white" fill-opacity="0.4"/>
        </svg>
      </div>
    </div>

    <!-- Search bar -->
    <div class="search-bar-wrap" data-widget="Padding">
      <div class="search-bar" data-widget="SearchBar" data-provider="searchProvider">
        <div class="search-icon">
          <svg width="16" height="16" viewBox="0 0 16 16">
            <circle cx="7" cy="7" r="5" stroke="#6B7280" stroke-width="1.5" fill="none"/>
            <path d="M11 11l3 3" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <input class="search-input" type="text" placeholder="Search songs, artists, albums..." readonly />
        <div class="mic-icon">
          <svg width="16" height="16" viewBox="0 0 16 16">
            <rect x="5" y="1" width="6" height="9" rx="3" stroke="#6B7280" stroke-width="1.5" fill="none"/>
            <path d="M2 8a6 6 0 0012 0" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            <line x1="8" y1="14" x2="8" y2="16" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Scroll area -->
    <div class="scroll-area" data-widget="ListView" data-scroll="vertical">
      <div class="section-header">
        <span class="section-title" data-widget="Text" data-style="titleLarge">Search Results</span>
      </div>

      <div class="song-list" data-widget="Column">
        <div class="song-item" data-widget="SongTile" data-on-tap="playSong" onclick="location.href='full-player.html'">
          <div class="song-thumb blinding" data-widget="CachedNetworkImage" data-slot="leading"></div>
          <div class="song-info" data-widget="Column" data-slot="content">
            <div class="song-title" data-widget="Text" data-style="titleSmall" data-slot="title">Blinding Lights</div>
            <div class="song-meta" data-widget="Text" data-style="bodySmall" data-slot="subtitle">The Weeknd · 3:20</div>
          </div>
          <span class="song-duration" data-widget="Text" data-style="bodySmall" data-slot="trailing">3:20</span>
          <div class="song-menu" data-widget="IconButton" data-icon="more_vert" data-slot="trailing" data-on-tap="showSongMenu">
            <svg width="4" height="16" viewBox="0 0 4 16"><circle cx="2" cy="2" r="1.5"/><circle cx="2" cy="8" r="1.5"/><circle cx="2" cy="14" r="1.5"/></svg>
          </div>
        </div>

        <div class="song-item" data-widget="SongTile" data-on-tap="playSong" onclick="location.href='full-player.html'">
          <div class="song-thumb asit" data-widget="CachedNetworkImage" data-slot="leading"></div>
          <div class="song-info" data-widget="Column" data-slot="content">
            <div class="song-title" data-widget="Text" data-style="titleSmall" data-slot="title">As It Was</div>
            <div class="song-meta" data-widget="Text" data-style="bodySmall" data-slot="subtitle">Harry Styles · 2:37</div>
          </div>
          <span class="song-duration" data-widget="Text" data-style="bodySmall" data-slot="trailing">2:37</span>
          <div class="song-menu" data-widget="IconButton" data-icon="more_vert" data-slot="trailing" data-on-tap="showSongMenu">
            <svg width="4" height="16" viewBox="0 0 4 16"><circle cx="2" cy="2" r="1.5"/><circle cx="2" cy="8" r="1.5"/><circle cx="2" cy="14" r="1.5"/></svg>
          </div>
        </div>

        <div class="song-item" data-widget="SongTile" data-on-tap="playSong" onclick="location.href='full-player.html'">
          <div class="song-thumb midnight" data-widget="CachedNetworkImage" data-slot="leading"></div>
          <div class="song-info" data-widget="Column" data-slot="content">
            <div class="song-title" data-widget="Text" data-style="titleSmall" data-slot="title">Midnight Rain</div>
            <div class="song-meta" data-widget="Text" data-style="bodySmall" data-slot="subtitle">Taylor Swift · 3:56</div>
          </div>
          <span class="song-duration" data-widget="Text" data-style="bodySmall" data-slot="trailing">3:56</span>
          <div class="song-menu" data-widget="IconButton" data-icon="more_vert" data-slot="trailing" data-on-tap="showSongMenu">
            <svg width="4" height="16" viewBox="0 0 4 16"><circle cx="2" cy="2" r="1.5"/><circle cx="2" cy="8" r="1.5"/><circle cx="2" cy="14" r="1.5"/></svg>
          </div>
        </div>

        <div class="song-item" data-widget="SongTile" data-on-tap="playSong" onclick="location.href='full-player.html'">
          <div class="song-thumb antihero" data-widget="CachedNetworkImage" data-slot="leading"></div>
          <div class="song-info" data-widget="Column" data-slot="content">
            <div class="song-title" data-widget="Text" data-style="titleSmall" data-slot="title">Anti-Hero</div>
            <div class="song-meta" data-widget="Text" data-style="bodySmall" data-slot="subtitle">Taylor Swift · 3:20</div>
          </div>
          <span class="song-duration" data-widget="Text" data-style="bodySmall" data-slot="trailing">3:20</span>
          <div class="song-menu" data-widget="IconButton" data-icon="more_vert" data-slot="trailing" data-on-tap="showSongMenu">
            <svg width="4" height="16" viewBox="0 0 4 16"><circle cx="2" cy="2" r="1.5"/><circle cx="2" cy="8" r="1.5"/><circle cx="2" cy="14" r="1.5"/></svg>
          </div>
        </div>

        <div class="song-item" data-widget="SongTile" data-on-tap="playSong" onclick="location.href='full-player.html'">
          <div class="song-thumb cruel" data-widget="CachedNetworkImage" data-slot="leading"></div>
          <div class="song-info" data-widget="Column" data-slot="content">
            <div class="song-title" data-widget="Text" data-style="titleSmall" data-slot="title">Cruel Summer</div>
            <div class="song-meta" data-widget="Text" data-style="bodySmall" data-slot="subtitle">Taylor Swift · 2:58</div>
          </div>
          <span class="song-duration" data-widget="Text" data-style="bodySmall" data-slot="trailing">2:58</span>
          <div class="song-menu" data-widget="IconButton" data-icon="more_vert" data-slot="trailing" data-on-tap="showSongMenu">
            <svg width="4" height="16" viewBox="0 0 4 16"><circle cx="2" cy="2" r="1.5"/><circle cx="2" cy="8" r="1.5"/><circle cx="2" cy="14" r="1.5"/></svg>
          </div>
        </div>

        <div class="song-item" data-widget="SongTile" data-on-tap="playSong" onclick="location.href='full-player.html'">
          <div class="song-thumb stay" data-widget="CachedNetworkImage" data-slot="leading"></div>
          <div class="song-info" data-widget="Column" data-slot="content">
            <div class="song-title" data-widget="Text" data-style="titleSmall" data-slot="title">Stay</div>
            <div class="song-meta" data-widget="Text" data-style="bodySmall" data-slot="subtitle">Kid LAROI, Justin Bieber · 2:21</div>
          </div>
          <span class="song-duration" data-widget="Text" data-style="bodySmall" data-slot="trailing">2:21</span>
          <div class="song-menu" data-widget="IconButton" data-icon="more_vert" data-slot="trailing" data-on-tap="showSongMenu">
            <svg width="4" height="16" viewBox="0 0 4 16"><circle cx="2" cy="2" r="1.5"/><circle cx="2" cy="8" r="1.5"/><circle cx="2" cy="14" r="1.5"/></svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Mini Player -->
    <div class="mini-player" data-widget="MiniPlayerWidget" data-provider="playerProvider" data-on-tap="openFullPlayer" style="cursor:pointer;" onclick="location.href='full-player.html'">
      <div class="mini-thumb" data-widget="CachedNetworkImage" data-slot="leading"></div>
      <div class="mini-info" data-widget="Column" data-slot="content">
        <div class="mini-title" data-widget="Text" data-style="titleSmall">Song Title</div>
        <div class="mini-artist" data-widget="Text" data-style="bodySmall">Artist Name</div>
      </div>
      <div class="mini-controls" data-widget="Row" data-slot="trailing">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="white">
          <path d="M8 5l10 6-10 6V5z"/>
        </svg>
        <svg width="22" height="22" viewBox="0 0 22 22" fill="white">
          <path d="M6 5l8 6-8 6V5z"/>
          <rect x="15" y="5" width="2" height="12" rx="1"/>
        </svg>
      </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar" data-widget="BottomNavigationBar" data-provider="navigationProvider">
      <div class="tab-item" data-widget="BottomNavigationBarItem" onclick="location.href='home.html'" style="cursor:pointer;">
        <div class="tab-icon-wrap">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path d="M1 7L9 1l8 6v9a1 1 0 01-1 1h-4v-5H6v5H2a1 1 0 01-1-1V7z" fill="#6B7280"/>
          </svg>
        </div>
        <span class="tab-label" data-widget="Text" data-style="labelSmall">Home</span>
      </div>

      <div class="tab-item active" data-widget="BottomNavigationBarItem">
        <div class="tab-icon-wrap">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <circle cx="8" cy="8" r="6" stroke="white" stroke-width="2" fill="none"/>
            <path d="M13 13l4 4" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
        <span class="tab-label" data-widget="Text" data-style="labelSmall">Search</span>
      </div>

      <div class="tab-item" data-widget="BottomNavigationBarItem" onclick="location.href='library.html'" style="cursor:pointer;">
        <div class="tab-icon-wrap">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path d="M3 2h12a1 1 0 011 1v12a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="#6B7280" stroke-width="1.5" fill="none"/>
            <path d="M6 7h6M6 10h6M6 13h4" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
        <span class="tab-label" data-widget="Text" data-style="labelSmall">Library</span>
      </div>
    </div>
  </div>
</body>
</html>
