<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>Ymusic – Podcast Screen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; }
    .phone { width: 390px; height: 844px; background: #0D0D0D; border-radius: 44px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 40px 120px rgba(0,0,0,0.8); }
    .status-bar { height: 44px; padding: 14px 24px 0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .status-time { font-size: 15px; font-weight: 600; color: #FFFFFF; }
    .status-icons { display: flex; align-items: center; gap: 6px; }
    .top-nav { padding: 6px 20px 0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .nav-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    /* Podcast art */
    .art-section { padding: 16px 20px 0; display: flex; justify-content: center; flex-shrink: 0; }
    .podcast-art { width: 160px; height: 160px; border-radius: 16px; background: linear-gradient(135deg, #1D4ED8, #3B82F6); box-shadow: 0 12px 40px rgba(59, 130, 246, 0.3); }
    /* Podcast info */
    .podcast-info { padding: 20px 20px 0; text-align: center; flex-shrink: 0; }
    .podcast-name { font-size: 20px; font-weight: 700; color: #FFFFFF; }
    .podcast-author { font-size: 14px; color: #9CA3AF; margin-top: 4px; }
    /* Subscribe button */
    .subscribe-row { padding: 16px 20px 0; display: flex; justify-content: center; flex-shrink: 0; }
    .subscribe-btn { height: 40px; padding: 0 28px; border-radius: 20px; background: #7C3AED; border: none; color: #FFFFFF; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; font-family: inherit; }
    /* Episodes header */
    .episodes-header { padding: 20px 20px 8px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.06); margin-top: 16px; }
    .episodes-title { font-size: 17px; font-weight: 700; color: #FFFFFF; }
    .episodes-count { font-size: 13px; color: #6B7280; }
    /* Episode list */
    .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; }
    .scroll-area::-webkit-scrollbar { display: none; }
    .episode-list { padding: 0 20px; }
    .episode-item { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: flex-start; gap: 12px; }
    .ep-number { font-size: 12px; color: #6B7280; flex-shrink: 0; padding-top: 1px; min-width: 28px; }
    .ep-info { flex: 1; min-width: 0; }
    .ep-title { font-size: 14px; font-weight: 600; color: #FFFFFF; line-height: 1.3; }
    .ep-meta { font-size: 12px; color: #6B7280; margin-top: 4px; }
    .ep-play { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    /* Mini player */
    .mini-player { background: #1C1C1E; border-top: 1px solid rgba(255,255,255,0.06); padding: 10px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .mini-thumb { width: 40px; height: 40px; border-radius: 6px; background: #2A2A2A; flex-shrink: 0; }
    .mini-info { flex: 1; min-width: 0; }
    .mini-title { font-size: 13px; font-weight: 600; color: #FFFFFF; }
    .mini-artist { font-size: 11px; color: #9CA3AF; margin-top: 1px; }
    .mini-controls { display: flex; align-items: center; gap: 16px; }
    /* Tab bar */
    .tab-bar { background: #111111; border-top: 1px solid rgba(255,255,255,0.05); padding: 10px 0 28px; display: flex; justify-content: space-around; align-items: center; flex-shrink: 0; }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; min-width: 80px; }
    .tab-icon-wrap { width: 64px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 20px; }
    .tab-item.active .tab-icon-wrap { background: #7C3AED; }
    .tab-label { font-size: 10px; font-weight: 600; color: #6B7280; letter-spacing: 0.5px; text-transform: uppercase; }
    .tab-item.active .tab-label { color: #FFFFFF; }
  </style>
</head>
<body>
  <div class="phone" data-widget="Scaffold">
    <div class="status-bar" data-widget="SafeArea">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M8 9.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3zM1.5 4.5a9 9 0 0113 0l-1.5 1.5a7 7 0 00-10 0L1.5 4.5zM4.5 7.5a5 5 0 017 0l-1.5 1.5a3 3 0 00-4 0L4.5 7.5zM.5 1.5A12 12 0 0115.5 1.5L14 3A10 10 0 002 3L.5 1.5z"/></svg>
        <svg width="20" height="12" viewBox="0 0 20 12" fill="none"><rect x="0.5" y="0.5" width="16" height="11" rx="2.5" stroke="white" stroke-opacity="0.35"/><rect x="2" y="2" width="11" height="8" rx="1.5" fill="white"/><path d="M17.5 4v4a1.5 1.5 0 000-4z" fill="white" fill-opacity="0.4"/></svg>
      </div>
    </div>
    <div class="top-nav" data-widget="Row">
      <div class="nav-btn" data-widget="IconButton" data-icon="keyboard_arrow_down" data-on-tap="pop" onclick="history.back()" style="cursor:pointer;"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M13 4L7 10l6 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="nav-btn"><svg width="20" height="4" viewBox="0 0 20 4" fill="white"><circle cx="2" cy="2" r="2"/><circle cx="10" cy="2" r="2"/><circle cx="18" cy="2" r="2"/></svg></div>
    </div>
    <div class="art-section" data-widget="Center"><div class="podcast-art" data-widget="ClipRRect"></div></div>
    <div class="podcast-info" data-widget="Column">
      <div class="podcast-name" data-widget="Text" data-style="headlineSmall">Lex Fridman Podcast</div>
      <div class="podcast-author" data-widget="Text" data-style="bodyMedium">Lex Fridman</div>
    </div>
    <div class="subscribe-row" data-widget="Center">
      <button class="subscribe-btn" data-widget="ElevatedButton" data-on-tap="subscribePodcast" data-provider="podcastProvider">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 3a8 8 0 018 8M3 7a4 4 0 014 4M5 11a2 2 0 11-4 0 2 2 0 014 0z" stroke="white" stroke-width="1.3" stroke-linecap="round"/></svg>
        Subscribe
      </button>
    </div>
    <div class="episodes-header" data-widget="Row">
      <span class="episodes-title" data-widget="Text" data-style="titleLarge">Episodes</span>
      <span class="episodes-count" data-widget="Text" data-style="bodySmall">412 total</span>
    </div>
    <div class="scroll-area" data-widget="ListView" data-scroll="vertical">
      <div class="episode-list" data-widget="ListView" data-scroll="vertical">
        <div class="episode-item" data-widget="EpisodeTile">
          <span class="ep-number" data-widget="Text" data-style="bodySmall" data-slot="leading">#412</span>
          <div class="ep-info" data-widget="Column" data-slot="content">
            <div class="ep-title" data-widget="Text" data-style="titleSmall">Sam Altman: OpenAI CEO on GPT-5</div>
            <div class="ep-meta" data-widget="Text" data-style="bodySmall">3h 12m · 2 days ago</div>
          </div>
          <div class="ep-play" data-widget="IconButton" data-icon="play_arrow" data-slot="trailing" onclick="location.href='video-player.html'"><svg width="10" height="12" viewBox="0 0 10 12" fill="white"><path d="M1 1l8 5-8 5V1z"/></svg></div>
        </div>
        <div class="episode-item" data-widget="EpisodeTile">
          <span class="ep-number" data-widget="Text" data-style="bodySmall" data-slot="leading">#411</span>
          <div class="ep-info" data-widget="Column" data-slot="content">
            <div class="ep-title" data-widget="Text" data-style="titleSmall">Elon Musk: Tesla, SpaceX, Mars</div>
            <div class="ep-meta" data-widget="Text" data-style="bodySmall">2h 41m · 1 week ago</div>
          </div>
          <div class="ep-play" data-widget="IconButton" data-icon="play_arrow" data-slot="trailing" onclick="location.href='video-player.html'"><svg width="10" height="12" viewBox="0 0 10 12" fill="white"><path d="M1 1l8 5-8 5V1z"/></svg></div>
        </div>
      </div>
    </div>
    <div class="mini-player" data-widget="MiniPlayerWidget" data-provider="playerProvider" data-on-tap="openFullPlayer" style="cursor:pointer;" onclick="location.href='full-player.html'">
      <div class="mini-thumb" data-widget="CachedNetworkImage" data-slot="leading"></div>
      <div class="mini-info" data-widget="Column" data-slot="content"><div class="mini-title" data-widget="Text" data-style="titleSmall">Song Title</div><div class="mini-artist" data-widget="Text" data-style="bodySmall">Artist Name</div></div>
      <div class="mini-controls" data-widget="Row" data-slot="trailing">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="white"><path d="M8 5l10 6-10 6V5z"/></svg>
        <svg width="22" height="22" viewBox="0 0 22 22" fill="white"><path d="M6 5l8 6-8 6V5z"/><rect x="15" y="5" width="2" height="12" rx="1"/></svg>
      </div>
    </div>
    <div class="tab-bar" data-widget="BottomNavigationBar" data-provider="navigationProvider">
      <div class="tab-item" data-widget="BottomNavigationBarItem" onclick="location.href='home.html'"><div class="tab-icon-wrap"><svg width="18" height="18" viewBox="0 0 18 18"><path d="M1 7L9 1l8 6v9a1 1 0 01-1 1h-4v-5H6v5H2a1 1 0 01-1-1V7z" fill="#6B7280"/></svg></div><span class="tab-label" data-widget="Text" data-style="labelSmall">Home</span></div>
      <div class="tab-item" data-widget="BottomNavigationBarItem" onclick="location.href='search.html'"><div class="tab-icon-wrap"><svg width="18" height="18" viewBox="0 0 18 18"><circle cx="8" cy="8" r="6" stroke="#6B7280" stroke-width="2" fill="none"/><path d="M13 13l4 4" stroke="#6B7280" stroke-width="2" stroke-linecap="round" fill="none"/></svg></div><span class="tab-label" data-widget="Text" data-style="labelSmall">Search</span></div>
      <div class="tab-item active" data-widget="BottomNavigationBarItem"><div class="tab-icon-wrap"><svg width="18" height="18" viewBox="0 0 18 18"><path d="M3 2h12a1 1 0 011 1v12a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="white" stroke-width="1.5" fill="none"/><path d="M6 7h6M6 10h6M6 13h4" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg></div><span class="tab-label" data-widget="Text" data-style="labelSmall">Library</span></div>
    </div>
  </div>
</body>
</html>
